name: SPECTER VPN Tariff 20 Auto Update

on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tariff20:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update Tariff 20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_tariff20_cloud.py

      - name: Success notification
        if: success()
        run: |
          echo "keys.txt updated!"
          echo "https://raw.githubusercontent.com/spermoeshka/NEW_SRECTER/main/keys.txt"
